<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Project Brief Submission - Pickic</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e5e619",
                        "background-light": "#FFFBF0",
                        "background-dark": "#212111",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>.grain-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
    opacity: 0.04;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuA5aPLm2-5UjcvRzNs0fEUisKTCDV_4mpxeIhzsx-qd8QZHF82vtfzT-sFkY050dDIfug6yWB_cnHXQJfLOzsSA94-mgrlAd5-H2RDXp26vq2FRk-RHyGvB4geg5rGX8_LBvLCmN_wpHSgM0E_fgZtFT4WDkpzzyOa3jtz7VGrgLSkC0md0BUIfUmwqL6-9F0o5Zh8fLlqxjmFXFwXd6ab1K-0lddMLI4sHK7-vmhgYvL_0uCt7GxPXrudSC-MTgzqGptSUkEEujro)
    }
.form-input::placeholder {
    opacity: 0.4
    }
.flush-border {
    border-top: none;
    border-left: none;
    border-right: none;
    border-bottom: 1px solid rgba(24, 24, 17, 0.1)
    }
.flush-border:focus {
    border-bottom: 1px solid #181811 !important;
    box-shadow: none !important
    }</style>
<style>
    
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#181811] dark:text-[#FFFBF0] min-h-screen"><div id="app-shell">
<div class="grain-overlay"></div>
<div class="relative flex h-auto min-h-screen w-full flex-col max-w-md mx-auto overflow-x-hidden">
<!-- TopAppBar -->
<div class="flex items-center p-4 pt-8 pb-4 justify-between sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-sm z-40">
<div class="text-[#181811] dark:text-[#FFFBF0] flex size-12 shrink-0 items-center cursor-pointer" data-icon="ArrowLeft" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-[#181811] dark:text-[#FFFBF0] text-[10px] tracking-[0.3em] font-bold uppercase flex-1 text-center">Project_Submission</h2>
<div class="size-12"></div>
</div>
<!-- HeadlineText -->
<div class="px-6 pt-10 pb-6">
<h2 class="text-[#181811] dark:text-[#FFFBF0] tracking-tight text-[32px] font-light leading-tight">Create your <br/><span class="font-bold">Visual Narrative</span></h2>
<div class="h-[1px] w-12 bg-primary mt-6"></div>
</div>
<div class="flex flex-col gap-8 px-6 pb-24">
<!-- TextField: Date -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-[#181811] dark:text-[#FFFBF0] text-[10px] tracking-[0.2em] font-medium uppercase pb-1 opacity-60">[Project_Date]</p>
<input class="form-input flush-border w-full rounded-none bg-transparent px-0 py-4 text-lg font-normal focus:outline-none placeholder:text-[#181811]/30 dark:placeholder:text-[#FFFBF0]/30" placeholder="DD / MM / YYYY" type="text"/>
</label>
</div>
<!-- TextField: Location -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-[#181811] dark:text-[#FFFBF0] text-[10px] tracking-[0.2em] font-medium uppercase pb-1 opacity-60">[Location]</p>
<input class="form-input flush-border w-full rounded-none bg-transparent px-0 py-4 text-lg font-normal focus:outline-none placeholder:text-[#181811]/30 dark:placeholder:text-[#FFFBF0]/30" placeholder="Studio or Outdoor address" type="text"/>
</label>
</div>
<!-- TextField: Requirements -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-[#181811] dark:text-[#FFFBF0] text-[10px] tracking-[0.2em] font-medium uppercase pb-1 opacity-60">[Requirements]</p>
<textarea class="form-input flush-border w-full min-h-[160px] rounded-none bg-transparent px-0 py-4 text-lg font-normal resize-none focus:outline-none placeholder:text-[#181811]/30 dark:placeholder:text-[#FFFBF0]/30" placeholder="Creative direction, mood, and specific shots..."></textarea>
</label>
</div>
<!-- Image/Mood Placeholder -->
<div class="mt-4">
<div class="w-full aspect-[16/9] bg-[#181811]/5 dark:bg-[#FFFBF0]/5 border border-dashed border-[#181811]/10 dark:border-[#FFFBF0]/10 rounded flex flex-col items-center justify-center gap-3">
<span class="material-symbols-outlined text-[#181811]/40 dark:text-[#FFFBF0]/40">add_photo_alternate</span>
<p class="text-[10px] tracking-widest uppercase opacity-40">Upload Moodboard (Optional)</p>
</div>
</div>
</div>
<!-- Sticky Bottom Button -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/90 to-transparent pt-12">
<button class="group relative w-full bg-background-light dark:bg-background-dark border border-[#181811]/10 dark:border-[#FFFBF0]/10 overflow-hidden h-16 rounded transition-all active:scale-[0.98]">
<!-- Subtle texture for the button -->
<div class="absolute inset-0 opacity-[0.08] pointer-events-none" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCztAVQvxzbYGle9nLVqmyCe-WVWKgFXdjsgQmEZs3ziUvXulqv47n52eR8IFgcjfCvFkBNQUnj3mrT1JLSvIQ4fBVraF7mgX2zU8dMB0j7VUg_dp_62OIS-bVpKkW_Fce1QoeFR-SREMvPFKXtNfLjn4mo96cs_N2FLAaS5zDg2-eA-S0D1ay4IMOZmh_noHWPL8klwbhP3ZWWFiMu6vtv8_OczpR5CsMvUHmUv0JGMkGCnEk9MPlBGmIKywL3JiCbDZCrb3nQQpo');"></div>
<div class="relative flex items-center justify-center gap-2">
<span class="text-[#181811] dark:text-[#FFFBF0] text-[12px] tracking-[0.4em] font-bold uppercase">Continue</span>
<span class="material-symbols-outlined text-[18px] transform group-hover:translate-x-1 transition-transform">arrow_right_alt</span>
</div>
<!-- Primary accent line at bottom of button -->
<div class="absolute bottom-0 left-0 right-0 h-[2px] bg-primary scale-x-0 group-hover:scale-x-100 transition-transform origin-center"></div>
</button>
</div>
</div>
</div></body></html>
