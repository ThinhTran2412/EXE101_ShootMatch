<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Chỉnh Sửa Hồ Sơ - PicKic</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/pickic-design-system.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFFBF0",
                        "accent": "#1a1a0f",
                    },
                    fontFamily: {
                        "sans": ["Plus Jakarta Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
    
    </style>
</head>
<body class="bg-primary text-accent"><div id="app-shell">
    <div class="film-grain"></div>
    
    <!-- Header -->
    <header class="sticky top-0 z-40 bg-primary/80 backdrop-blur-md px-6 py-4 flex items-center justify-between">
        <a href="profile.html" class="flex items-center justify-center size-10 rounded-full border border-accent/5 hover:bg-accent/5 transition-colors">
            <span class="material-symbols-outlined text-xl">arrow_back</span>
        </a>
        <h2 class="text-lg font-semibold">Chỉnh Sửa Hồ Sơ</h2>
        <button class="text-sm font-semibold hover:opacity-60">Lưu</button>
    </header>

    <main class="px-6 pt-6 pb-32">
        <!-- Profile Photo -->
        <section class="mb-8 text-center">
            <div class="relative inline-block">
                <div class="size-32 bg-center bg-cover rounded-full clay-card border-4 border-primary mx-auto" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBIWRKDnXjM2KaMVaMG4MZ-f2-TDUuI4YDJPVUQZ6huNmjdPINP3GKkKERH51od1peg_63OEN34H6KMOvgyiRRT79MSbEo4sSWQAXvC8gUDp-psRl8zcFrLa1cAlhqy22MyRspLimSt9mw4D4d_oaWhEU46R9edGVcWOnzdeAYYHm68BO2Zv-RyttWCDRP1M9MKxj-Bckj0WUx_58I3mrXrMtHf9WjIiuywAmSTP9dAzE-G-uyazVpV2eGbZ3BcTS52-z61gZ5rhFY");'></div>
                <button class="absolute bottom-0 right-0 size-10 rounded-full clay-card flex items-center justify-center border-2 border-primary hover:opacity-80 transition-opacity">
                    <span class="material-symbols-outlined text-sm">camera_alt</span>
                </button>
            </div>
            <p class="text-xs opacity-60 mt-4">Nhấn để thay đổi ảnh đại diện</p>
        </section>

        <!-- Form Fields -->
        <section class="space-y-6">
            <div>
                <label class="text-xs font-semibold uppercase tracking-wider opacity-60 mb-2 block">Họ và Tên</label>
                <input type="text" value="Nguyễn Văn A" class="w-full px-4 py-3 rounded-xl clay-card border border-accent/10 focus:outline-none focus:border-accent/30 transition-colors">
            </div>

            <div>
                <label class="text-xs font-semibold uppercase tracking-wider opacity-60 mb-2 block">Email</label>
                <input type="email" value="nguyenvana@email.com" class="w-full px-4 py-3 rounded-xl clay-card border border-accent/10 focus:outline-none focus:border-accent/30 transition-colors">
            </div>

            <div>
                <label class="text-xs font-semibold uppercase tracking-wider opacity-60 mb-2 block">Số Điện Thoại</label>
                <input type="tel" value="0987 654 321" class="w-full px-4 py-3 rounded-xl clay-card border border-accent/10 focus:outline-none focus:border-accent/30 transition-colors">
            </div>

            <div>
                <label class="text-xs font-semibold uppercase tracking-wider opacity-60 mb-2 block">Ngày Sinh</label>
                <input type="date" class="w-full px-4 py-3 rounded-xl clay-card border border-accent/10 focus:outline-none focus:border-accent/30 transition-colors">
            </div>

            <div>
                <label class="text-xs font-semibold uppercase tracking-wider opacity-60 mb-2 block">Giới Tính</label>
                <div class="flex gap-3">
                    <button class="flex-1 px-4 py-3 rounded-xl clay-card text-center hover:opacity-80 transition-opacity">Nam</button>
                    <button class="flex-1 px-4 py-3 rounded-xl clay-card text-center hover:opacity-80 transition-opacity">Nữ</button>
                    <button class="flex-1 px-4 py-3 rounded-xl clay-card text-center hover:opacity-80 transition-opacity">Khác</button>
                </div>
            </div>

            <div>
                <label class="text-xs font-semibold uppercase tracking-wider opacity-60 mb-2 block">Địa Chỉ</label>
                <textarea rows="3" class="w-full px-4 py-3 rounded-xl clay-card border border-accent/10 focus:outline-none focus:border-accent/30 transition-colors resize-none" placeholder="Nhập địa chỉ của bạn..."></textarea>
            </div>

            <div>
                <label class="text-xs font-semibold uppercase tracking-wider opacity-60 mb-2 block">Giới Thiệu</label>
                <textarea rows="4" class="w-full px-4 py-3 rounded-xl clay-card border border-accent/10 focus:outline-none focus:border-accent/30 transition-colors resize-none" placeholder="Viết vài dòng về bản thân..."></textarea>
            </div>
        </section>

        <!-- Save Button -->
        <div class="mt-8">
            <a href="profile.html" class="block w-full modern-btn-primary text-center py-4">
                Lưu Thay Đổi
            </a>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-primary/90 backdrop-blur-xl border-t border-accent/5 pb-8 pt-3">
        <div class="flex justify-around items-center max-w-md mx-auto px-6">
            <a href="index.html" class="flex flex-col items-center gap-1 text-accent/40 hover:text-accent transition-colors">
                <span class="material-symbols-outlined text-[28px]">home</span>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Trang chủ</span>
            </a>
            <a href="discovery.html" class="flex flex-col items-center gap-1 text-accent/40 hover:text-accent transition-colors">
                <span class="material-symbols-outlined text-[28px]">explore</span>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Khám phá</span>
            </a>
            <a href="search.html" class="flex flex-col items-center gap-1 text-accent/40 hover:text-accent transition-colors">
                <span class="material-symbols-outlined text-[28px]">search</span>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Tìm kiếm</span>
            </a>
            <a href="all-chat.html" class="flex flex-col items-center gap-1 text-accent/40 hover:text-accent transition-colors">
                <span class="material-symbols-outlined text-[28px]">chat_bubble</span>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Tin nhắn</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center gap-1 text-accent">
                <span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">person</span>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Tài khoản</span>
            </a>
        </div>
        <div class="w-32 h-1 bg-accent/10 mx-auto mt-4 rounded-full"></div>
    </nav>
</div></body>
</html>
