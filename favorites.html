<!DOCTYPE html>
<html class="light" lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Yêu Thích - PicKic</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/pickic-design-system.css">
    <script src="js/pickic-store.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f8f8d9",
                        "accent": "#1a1a0f",
                    },
                    fontFamily: {
                        "sans": ["Plus Jakarta Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>

    </style>
</head>

<body class="bg-primary text-accent">
    <div id="app-shell">
        <div class="film-grain"></div>
        <div class="mobile-container">

            <!-- Header -->
            <header
                class="sticky top-0 z-40 bg-primary/80 backdrop-blur-md px-6 py-4 flex items-center justify-between">
                <a href="profile.html"
                    class="flex items-center justify-center size-10 rounded-full border border-accent/5 hover:bg-accent/5 transition-colors">
                    <span class="material-symbols-outlined text-xl">arrow_back</span>
                </a>
                <h2 class="text-lg font-semibold">Yêu Thích</h2>
                <div class="size-10"></div>
            </header>

            <main class="px-6 pt-6 pb-32">
                <div id="savedPhotographers" class="grid grid-cols-2 gap-4">
                    <!-- Saved photographers will be loaded here -->
                </div>

                <!-- Empty State (if no favorites) -->
                <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-center">
                    <span class="material-symbols-outlined text-6xl text-accent/20 mb-4">bookmark</span>
                    <h3 class="font-semibold text-lg mb-2">Chưa có mục đã lưu</h3>
                    <p class="text-sm opacity-60 mb-6">Quẹt trái trong Discovery để lưu photographers</p>
                    <a href="discovery.html" class="modern-btn-primary px-6 py-3 rounded-full">
                        Khám Phá Ngay
                    </a>
                </div>
            </main>

            <script>
                function loadFavorites() {
                    const saved = PicKicStore.getFavorites();
                    const container = document.getElementById('savedPhotographers');
                    const emptyState = document.getElementById('emptyState');

                    if (saved.length === 0) {
                        container.classList.add('hidden');
                        emptyState.classList.remove('hidden');
                        return;
                    }

                    container.classList.remove('hidden');
                    emptyState.classList.add('hidden');

                    container.innerHTML = saved.map((p) => `
                <div id="card_${p.id}" class="relative">
                    <div onclick="viewProfile('${p.id}')" class="block cursor-pointer">
                        <div class="aspect-[3/4] bg-center bg-cover rounded-xl clay-card overflow-hidden hover:scale-[0.98] transition-transform relative" style="background-image: ${p.image || 'url(https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=600&q=80)'}">
                            <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/70 to-transparent">
                                <p class="text-white font-semibold text-sm">${p.name}</p>
                                <p class="text-white/80 text-xs">${p.studio}</p>
                                <div class="flex items-center gap-1 mt-1">
                                    <span class="text-yellow-400 text-xs">&#9733;</span>
                                    <span class="text-white/80 text-xs">${p.rating}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button onclick="removeFav('${p.id}')" 
                        class="absolute top-2 right-2 size-8 rounded-full bg-red-500/90 backdrop-blur-sm flex items-center justify-center hover:bg-red-600 transition-colors shadow-lg"
                        title="Bỏ yêu thích">
                        <span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'FILL' 1;">bookmark_remove</span>
                    </button>
                </div>
            `).join('');
                }

                function viewProfile(id) {
                    sessionStorage.setItem('viewingPhotographer', id);
                    window.location.href = 'photo-profile.html';
                }

                function removeFav(id) {
                    PicKicStore.removeFavorite(id);
                    const card = document.getElementById('card_' + id);
                    if (card) {
                        card.style.transition = 'all 0.3s ease';
                        card.style.transform = 'scale(0.9)';
                        card.style.opacity = '0';
                        setTimeout(() => { card.remove(); loadFavorites(); }, 300);
                    }
                }

                document.addEventListener('DOMContentLoaded', loadFavorites);
            </script>
            <!-- <div class="text-center py-16">
            <div class="size-20 rounded-full clay-inset flex items-center justify-center mx-auto mb-4">
                <span class="material-symbols-outlined text-4xl text-accent/40">favorite</span>
            </div>
            <h3 class="font-semibold mb-2">Chưa có yêu thích</h3>
            <p class="text-sm opacity-60 mb-6">Lưu các photographer bạn yêu thích để xem lại sau</p>
            <a href="discovery.html" class="inline-block px-6 py-3 rounded-xl clay-card text-sm font-semibold hover:opacity-80">
                Khám Phá Ngay
            </a>
        </div> -->
            </main>

            <!-- Bottom Navigation -->
            <nav
                class="fixed bottom-0 left-0 right-0 z-50 bg-primary/90 backdrop-blur-xl border-t border-accent/5 pb-8 pt-3">
                <div class="flex justify-around items-center max-w-md mx-auto px-6">
                    <a href="index.html"
                        class="flex flex-col items-center gap-1 text-accent/40 hover:text-accent transition-colors">
                        <span class="material-symbols-outlined text-[28px]">home</span>
                        <span class="text-[9px] font-bold uppercase tracking-tighter">Trang chủ</span>
                    </a>
                    <a href="discovery.html"
                        class="flex flex-col items-center gap-1 text-accent/40 hover:text-accent transition-colors">
                        <span class="material-symbols-outlined text-[28px]">explore</span>
                        <span class="text-[9px] font-bold uppercase tracking-tighter">Khám phá</span>
                    </a>
                    <a href="search.html"
                        class="flex flex-col items-center gap-1 text-accent/40 hover:text-accent transition-colors">
                        <span class="material-symbols-outlined text-[28px]">search</span>
                        <span class="text-[9px] font-bold uppercase tracking-tighter">Tìm kiếm</span>
                    </a>
                    <a href="all-chat.html"
                        class="flex flex-col items-center gap-1 text-accent/40 hover:text-accent transition-colors">
                        <span class="material-symbols-outlined text-[28px]">chat_bubble</span>
                        <span class="text-[9px] font-bold uppercase tracking-tighter">Tin nhắn</span>
                    </a>
                    <a href="profile.html" class="flex flex-col items-center gap-1 text-accent">
                        <span class="material-symbols-outlined text-[28px]"
                            style="font-variation-settings: 'FILL' 1;">person</span>
                        <span class="text-[9px] font-bold uppercase tracking-tighter">Tài khoản</span>
                    </a>
                </div>
                <div class="w-32 h-1 bg-accent/10 mx-auto mt-4 rounded-full"></div>
            </nav>
        </div>
    </div>
</body>

</html>
