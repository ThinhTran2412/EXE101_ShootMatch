    <style>
        /* Card Stack */
        .card-stack {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 420px;
            /* Aspect ratio and max height handled by flexbox wrapper */
        }

        .swipe-card {
            position: absolute;
            width: 100%;
            height: 100%;
            cursor: grab;
            user-select: none;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            will-change: transform;
        }

        .swipe-card:active {
            cursor: grabbing;
        }

        .swipe-card.swiping {
            transition: none;
        }

        /* Image Carousel */
        .image-carousel {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .carousel-track {
            display: flex;
            width: 500%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .carousel-slide {
            width: 20%;
            height: 100%;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
        }

        .carousel-indicators {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            z-index: 20;
        }

        .carousel-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .carousel-dot.active {
            width: 20px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.95);
        }

        /* Swipe Overlays */
        .swipe-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
            z-index: 30;
        }

        .swipe-overlay.like {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.3), rgba(34, 197, 94, 0.1));
        }

        .swipe-overlay.nope {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.3), rgba(239, 68, 68, 0.1));
        }

        .swipe-overlay.active {
            opacity: 1;
        }

        .swipe-overlay-text {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transform: rotate(-15deg);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            padding: 16px 32px;
            border-radius: 8px;
        }

        .swipe-overlay.like .swipe-overlay-text {
            color: #22c55e;
            border: 4px solid #22c55e;
        }

        .swipe-overlay.nope .swipe-overlay-text {
            color: #ef4444;
            border: 4px solid #ef4444;
        }

        /* Action Buttons */
        .action-btn {
            position: relative;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            overflow: hidden;
        }

        .action-btn:active {
            transform: scale(0.88) !important;
        }

        .action-btn.like {
            background: linear-gradient(135deg, #fff7e1, #ffe8c0);
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.2), inset 0 2px 4px rgba(255, 255, 255, 0.8);
        }

        .action-btn.like:hover {
            box-shadow: 0 12px 32px rgba(239, 68, 68, 0.35), inset 0 2px 4px rgba(255, 255, 255, 0.8);
            transform: translateY(-3px);
        }

        .action-btn.like.active {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .action-btn.nope {
            background: linear-gradient(135deg, #fff7e1, #ffe8c0);
            box-shadow: 0 8px 24px rgba(26, 26, 15, 0.1), inset 0 2px 4px rgba(255, 255, 255, 0.8);
        }

        .action-btn.nope:hover {
            box-shadow: 0 12px 32px rgba(26, 26, 15, 0.2), inset 0 2px 4px rgba(255, 255, 255, 0.8);
            transform: translateY(-3px);
        }

        .action-btn.info {
            background: linear-gradient(135deg, #fff7e1, #ffe8c0);
            box-shadow: 0 8px 24px rgba(26, 26, 15, 0.08), inset 0 2px 4px rgba(255, 255, 255, 0.8);
        }

        .action-btn.info:hover {
            box-shadow: 0 12px 32px rgba(26, 26, 15, 0.15), inset 0 2px 4px rgba(255, 255, 255, 0.8);
            transform: translateY(-3px);
        }

        /* Card Enter Animation */
        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(24px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .card-enter {
            animation: cardEnter 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Match Animation */
        @keyframes matchPulse {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.15)
            }
        }

        .match-pulse {
            animation: matchPulse 0.5s ease-in-out;
        }

        /* Like feedback burst */
        @keyframes likeBurst {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.4);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .like-burst {
            animation: likeBurst 0.5s ease-out;
        }

        /* Empty State */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        /* Toast */
        #swipeToast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a1a0f;
            color: #FFFBF0;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            pointer-events: none;
        }

        #swipeToast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Tech metadata bar */
        .tech-bar {
            font-family: 'Courier New', monospace;
        }

        /* Background cards (behind active) */

            z-index: 9;
            transform: scale(0.95) translateY(12px);
            opacity: 0.75;
            pointer-events: none;
        }

        .bg-card-3 {
            z-index: 8;
            transform: scale(0.90) translateY(24px);
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

        // ─── STATE ─────────────────────────────────────────────────────────────────
        let currentIndex = 0;
        let isDragging = false;
        let startX = 0, startY = 0, currentX = 0, currentY = 0;
        let activeCard = null;
        const TOTAL = PHOTOGRAPHERS.length;

        // ─── RENDER CARD ───────────────────────────────────────────────────────────
        function createCard(photographer, zIndex, isBackground = false) {
            const card = document.createElement('div');
            card.className = 'swipe-card' + (isBackground ? '' : ' card-enter');
            card.dataset.photographerId = photographer.id;
            card.dataset.photographerIndex = PHOTOGRAPHERS.indexOf(photographer);
            card.style.zIndex = zIndex;
            if (isBackground) {
                card.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
                card.style.pointerEvents = 'none';
            }

            const bgClass = isBackground && zIndex === 9 ? 'bg-card-2' :
                isBackground && zIndex === 8 ? 'bg-card-3' : '';
            if (bgClass) card.classList.add(bgClass);

            const verifiedBadge = photographer.verified
                ? `<div class="flex items-center gap-1 mb-2">
                <span class="material-symbols-outlined text-green-400 text-sm" style="font-variation-settings: 'FILL' 1;">verified</span>
                <span class="text-white text-xs font-semibold tracking-wide">Verified</span>
               </div>`
                : '';

            const tagsHTML = photographer.tags.map(t =>
                `<span class="px-3 py-1 rounded-full bg-white/20 backdrop-blur-sm text-white text-[10px] font-semibold">${t}</span>`
            ).join('');

            const imagesHTML = photographer.images.map((img, i) =>
                `<div class="carousel-slide" style="background-image: url('${img}');"></div>`
            ).join('');

            const dotsHTML = photographer.images.map((_, i) =>
                `<div class="carousel-dot ${i === 0 ? 'active' : ''}" data-slide="${i}"></div>`
            ).join('');

            const ratingStars = '★'.repeat(Math.round(photographer.rating));

            card.innerHTML = `
            <div class="image-carousel">
                <div class="carousel-track">${imagesHTML}</div>
                <div class="carousel-indicators">${dotsHTML}</div>

                <!-- Swipe Overlays -->
                <div class="swipe-overlay like">
                    <div class="swipe-overlay-text">❤️ LIKE</div>
                </div>
                <div class="swipe-overlay nope">
                    <div class="swipe-overlay-text">NOPE</div>
                </div>

                <!-- Info Overlay -->
                <div class="absolute bottom-0 left-0 right-0 px-6 pb-6 pt-28 bg-gradient-to-t from-black/90 via-black/60 to-transparent z-10">
                    ${verifiedBadge}
                    <h1 class="text-white font-bold italic text-3xl leading-none mb-1 drop-shadow-lg">${photographer.name}</h1>
                    <p class="text-white/80 font-mono text-[10px] uppercase tracking-[0.25em] mb-3">${photographer.studio} · ${photographer.location}</p>
                    
                    <div class="flex items-center gap-4 text-xs mb-3">
                        <div class="flex items-center gap-1">
                            <span class="text-amber-400 text-sm">★</span>
                            <span class="text-white font-semibold">${photographer.rating}</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-white/70 text-sm">payments</span>
                            <span class="text-white/90">${photographer.price} VNĐ</span>
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-1.5 mb-3">${tagsHTML}</div>
                    
                    <p class="text-white/60 text-xs italic mb-4">"${photographer.quote}"</p>

                    <div class="flex justify-between border-t border-white/20 pt-3 tech-bar">
                        <div class="flex flex-col">
                            <span class="text-white/50 text-[8px] uppercase font-bold tracking-tighter">Style</span>
                            <span class="text-white text-[11px] font-semibold">${photographer.style}</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <span class="text-white/50 text-[8px] uppercase font-bold tracking-tighter">Năm KN</span>
                            <span class="text-white text-[11px] font-semibold">${photographer.experience}</span>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="text-white/50 text-[8px] uppercase font-bold tracking-tighter">Đã hoàn thành</span>
                            <span class="text-white text-[11px] font-semibold">${photographer.completedJobs} buổi</span>
                        </div>
                    </div>
                </div>
            </div>
        `;

            // Setup carousel for this card
            setupCardCarousel(card, photographer.images.length);

            return card;
        }

        // ─── RENDER STACK ──────────────────────────────────────────────────────────
        function renderStack() {
            const stack = document.getElementById('cardStack');
            // Remove existing cards (not the empty state)
            stack.querySelectorAll('.swipe-card').forEach(c => c.remove());

            if (currentIndex >= TOTAL) {
                document.getElementById('emptyStateView').style.display = 'flex';
                return;
            }

            document.getElementById('emptyStateView').style.display = 'none';

            // Render 3 cards (active + 2 background)
            for (let i = Math.min(currentIndex + 2, TOTAL - 1); i >= currentIndex; i--) {
                const p = PHOTOGRAPHERS[i];
                const zIndex = 10 - (i - currentIndex);
                const isBg = i !== currentIndex;
                const card = createCard(p, zIndex, isBg);
                stack.appendChild(card);
            }

            // Setup drag on active card
            activeCard = stack.querySelector('.swipe-card[style*="z-index: 10"]');
            if (activeCard) setupDrag(activeCard);

            updateProgress();
        }

        // ─── METADATA BAR ──────────────────────────────────────────────────────────
        // removed global meta update since it is now baked into the card HTML
        function updateMeta() {
            // no-op
        }

        // ─── PROGRESS ─────────────────────────────────────────────────────────────
        function updateProgress() {
            const idx = Math.min(currentIndex + 1, TOTAL);
            const pct = (idx / TOTAL) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('currentCard').textContent = idx;
            document.getElementById('totalCardsEl').textContent = TOTAL;
        }

        // ─── CAROUSEL ─────────────────────────────────────────────────────────────
        function setupCardCarousel(card, totalSlides) {
            const track = card.querySelector('.carousel-track');
            if (!track) return;

            let touchStartX = 0;
            let currentSlide = 0;

            // Click zones for photo navigation (left/right tap)
            card.addEventListener('click', (e) => {
                if (isDragging || Math.abs(currentX) > 10) return;
                const rect = card.getBoundingClientRect();
                const tapX = e.clientX - rect.left;
                if (tapX < rect.width / 2) {
                    if (currentSlide > 0) currentSlide--;
                } else {
                    if (currentSlide < totalSlides - 1) currentSlide++;
                }
                track.style.transform = `translateX(-${currentSlide * 20}%)`;
                updateDots(card, currentSlide);
            });
        }

        function updateDots(card, activeSlide) {
            card.querySelectorAll('.carousel-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === activeSlide);
            });
        }

        // ─── DRAG / SWIPE ──────────────────────────────────────────────────────────
        function setupDrag(card) {
            card.addEventListener('mousedown', onDragStart);
            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('mouseup', onDragEnd);
            card.addEventListener('touchstart', onDragStart, { passive: false });
            card.addEventListener('touchmove', onDragMove, { passive: false });
            card.addEventListener('touchend', onDragEnd);
        }

        function removeDragListeners() {
            document.removeEventListener('mousemove', onDragMove);
            document.removeEventListener('mouseup', onDragEnd);
        }

        function onDragStart(e) {
            if (!activeCard) return;
            isDragging = true;
            activeCard.classList.add('swiping');
            const pt = e.touches ? e.touches[0] : e;
            startX = pt.clientX; startY = pt.clientY;
            currentX = 0; currentY = 0;
            // Removed e.preventDefault() to allow browser-synthesized clicks on mobile
        }

        function onDragMove(e) {
            if (!isDragging || !activeCard) return;
            const pt = e.touches ? e.touches[0] : e;
            currentX = pt.clientX - startX;
            currentY = pt.clientY - startY;

            // Only prevent default if we've moved enough to be considered a drag
            // This allows taps to pass through on mobile
            if (Math.abs(currentX) > 5 || Math.abs(currentY) > 5) {
                if (e.cancelable) e.preventDefault();
            } else {
                return; // Don't update transform for micro-movements
            }

            const rot = currentX * 0.08;
            activeCard.style.transition = 'none';
            activeCard.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rot}deg)`;

            const likeEl = activeCard.querySelector('.swipe-overlay.like');
            const nopeEl = activeCard.querySelector('.swipe-overlay.nope');
            const likeBtn = document.getElementById('likeBtn');
            const nopeBtn = document.getElementById('nopeBtn');

            if (currentX > 40) {
                likeEl.classList.add('active'); nopeEl.classList.remove('active');
                if (likeBtn) likeBtn.classList.add('active');
                if (nopeBtn) nopeBtn.classList.remove('active');
            } else if (currentX < -40) {
                nopeEl.classList.add('active'); likeEl.classList.remove('active');
                if (nopeBtn) nopeBtn.classList.add('active');
                if (likeBtn) likeBtn.classList.remove('active');
            } else {
                likeEl.classList.remove('active'); nopeEl.classList.remove('active');
                if (likeBtn) likeBtn.classList.remove('active');
                if (nopeBtn) nopeBtn.classList.remove('active');
            }
        }

        function onDragEnd() {
            if (!isDragging || !activeCard) return;
            isDragging = false;
            activeCard.classList.remove('swiping');

            if (currentX > 100) {
                swipeLike();
            } else if (currentX < -100) {
                swipeNope();
            } else {
                // Snap back with spring
                activeCard.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
                activeCard.style.transform = 'translate(0,0) rotate(0deg)';
                activeCard.querySelector('.swipe-overlay.like').classList.remove('active');
                activeCard.querySelector('.swipe-overlay.nope').classList.remove('active');
                const likeBtn = document.getElementById('likeBtn');
                const nopeBtn = document.getElementById('nopeBtn');
                if (likeBtn) likeBtn.classList.remove('active');
                if (nopeBtn) nopeBtn.classList.remove('active');
            }
            currentX = 0; currentY = 0;
        }

        // ─── SWIPE LOGIC ───────────────────────────────────────────────────────────
        function swipeLike() {
            if (!activeCard || currentIndex >= TOTAL) return;
            const p = PHOTOGRAPHERS[currentIndex];

            // Animate out to the RIGHT
            activeCard.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease';
            activeCard.style.transform = `translate(1200px, ${currentY * 0.5}px) rotate(28deg)`;
            activeCard.style.opacity = '0';

            // ❤️ Add to favorites via PicKicStore
            const added = PicKicStore.toggleFavorite({
                id: p.id,
                name: p.name,
                studio: p.studio,
                location: p.location,
                rating: p.rating,
                price: p.price + ' VNĐ',
                tags: p.tags,
                image: `url('${p.images[0]}')`,
            });

            // Pulse like button if exists
            const likeBtn = document.getElementById('likeBtn');
            if (likeBtn) {
                likeBtn.classList.add('like-burst');
                setTimeout(() => likeBtn.classList.remove('like-burst'), 500);
            }

            showToast(added ? `❤️ Đã lưu ${p.name} vào Yêu Thích!` : `💔 Đã bỏ ${p.name} khỏi Yêu Thích`);

            setTimeout(() => {
                currentIndex++;
                renderStack();
            }, 400);
        }

        function swipeNope() {
            if (!activeCard || currentIndex >= TOTAL) return;

            // Animate out to the LEFT
            activeCard.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease';
            activeCard.style.transform = `translate(-1200px, ${currentY * 0.5}px) rotate(-28deg)`;
            activeCard.style.opacity = '0';

            setTimeout(() => {
                currentIndex++;
                renderStack();
            }, 400);
        }

        function goToProfile() {
            // Save current photographer id to sessionStorage
            if (currentIndex < TOTAL) {
                sessionStorage.setItem('viewingPhotographer', PHOTOGRAPHERS[currentIndex].id);
            }
            window.location.href = 'photo-profile.html';
        }

        function resetDiscovery() {
            currentIndex = 0;
            renderStack();
        }

        // ─── TOAST ────────────────────────────────────────────────────────────────
        function showToast(msg) {
            const toast = document.getElementById('swipeToast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._t);
            toast._t = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        // ─── INIT ─────────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            renderStack();
        });
    </script>
