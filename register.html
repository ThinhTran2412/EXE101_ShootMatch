<!doctype html>
<html class="light" lang="vi">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Đăng Ký - PicKic</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/pickic-design-system.css" />
  <script src="js/pickic-store.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#FFFBF0",
            accent: "#1a1a0f",
            "beige-tonal": "#f0f0d0",
            "beige-deep": "#e8e8c8",
          },
          fontFamily: {
            sans: ["Plus Jakarta Sans", "sans-serif"],
            display: ["'Fz Anton Round'", "Anton", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    .artistic-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBwioxW3jjy_6uC1TYEOXInAWiG6Lfhucd-W1WaCTQ7qyl_q0i6jj1OY14vSUiNUTGgQdWORgkYjbpRWYAGKHUI7_0uZqa2XjNXoVdZ8orm0Qo0YnWiBanA2CUCj9p6ZHlbZIVDYsmOq3ggx6zDjiinNwBbZ7FYoM5MBA3SJdzYPp6n_Nr_KvjJt1LJ9er_nWvUjOy82Spo0AAss0vPPLWr2sY2SH7NFwyfrf9_400SCeU2c2F1WEl0ARHU0ohmb3hB2D4Cvv6ABdI");
      background-size: cover;
      background-position: center;
      opacity: 0.07;
      filter: sepia(20%) contrast(90%);
      z-index: 0;
    }

    .tag-pill {
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.625rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.3s ease;
      box-shadow: inset 0 0 0 0.5px rgba(26, 26, 15, 0.05);
    }

    .tag-pill.selected {
      background: #e8e8c8;
      color: #1a1a0f;
    }
  </style>
</head>

<body class="flex flex-col h-screen overflow-hidden bg-primary text-accent selection:bg-accent selection:text-primary">
  <div id="app-shell">
    <div class="film-grain"></div>
    <div class="artistic-bg"></div>

    <header class="relative z-10 px-8 pt-12 pb-6">
      <div class="flex justify-between items-center mb-12">
        <a href="index.html" class="hover:opacity-60 transition-opacity">
          <img src="assets/1.1 ngang@2x.png" alt="PicKic" class="h-20 w-auto" />
        </a>
        <span class="text-[9px] font-bold tracking-[0.3em] uppercase opacity-40">Entry_01</span>
      </div>
      <div class="max-w-xs">
        <h2 class="font-display text-4xl leading-[1.1] mb-4">Tạo Tài Khoản<br />Mới</h2>
        <p class="text-[11px] leading-relaxed opacity-50 font-light tracking-wide">
          Tham gia cộng đồng nhiếp ảnh gia và khách hàng chuyên nghiệp.
        </p>
      </div>
    </header>

    <main class="relative z-10 px-8 flex-1 flex flex-col justify-center overflow-y-auto pb-24">
      <form id="registerForm" class="space-y-6" onsubmit="handleRegister(event)">
        <div class="flex flex-col">
          <label class="text-[9px] uppercase tracking-[0.2em] font-bold opacity-30 mb-1">Họ và Tên</label>
          <input id="regName" class="minimal-input" placeholder="Nguyễn Văn A" type="text" required />
        </div>
        <div class="flex flex-col">
          <label class="text-[9px] uppercase tracking-[0.2em] font-bold opacity-30 mb-1">Email</label>
          <input id="regEmail" class="minimal-input" placeholder="your@email.com" type="email" required />
        </div>
        <div class="flex flex-col">
          <label class="text-[9px] uppercase tracking-[0.2em] font-bold opacity-30 mb-1">Mật Khẩu</label>
          <input class="minimal-input" placeholder="••••••••" type="password" required />
        </div>
        <div class="flex flex-col">
          <label class="text-[9px] uppercase tracking-[0.2em] font-bold opacity-30 mb-1">Bạn là</label>
          <div class="flex flex-wrap gap-2 mt-3">
            <button type="button" class="tag-pill bg-beige-deep/40 text-accent selected" onclick="toggleTag(this)">
              Khách hàng
            </button>
            <button type="button" class="tag-pill bg-primary/20 text-accent/40" onclick="toggleTag(this)">
              Photographer
            </button>
            <button type="button" class="tag-pill bg-primary/20 text-accent/40" onclick="toggleTag(this)">
              Studio
            </button>
          </div>
        </div>
        <div class="pt-10">
          <button
            class="textured-btn w-full py-5 rounded-sm text-[11px] font-bold tracking-[0.4em] uppercase text-accent/80 active:scale-[0.99] transition-transform"
            type="submit">
            Tạo Tài Khoản
          </button>
        </div>
      </form>
      <div class="mt-8 text-center">
        <a href="login.html"
          class="text-[10px] uppercase tracking-[0.2em] font-medium opacity-40 hover:opacity-80 transition-opacity">
          Đã có tài khoản? <span class="border-b border-accent/20 pb-0.5">Đăng Nhập</span>
        </a>
      </div>
    </main>

    <footer class="relative z-10 px-8 pb-12">
      <div class="flex items-center justify-between border-t border-accent/5 pt-6">
        <div class="flex gap-4">
          <span class="text-[8px] font-bold tracking-widest opacity-20 uppercase">Điều khoản</span>
          <span class="text-[8px] font-bold tracking-widest opacity-20 uppercase">Bảo mật</span>
        </div>
        <div class="flex items-center gap-2 opacity-20">
          <span class="material-symbols-outlined text-[14px]">verified</span>
          <span class="text-[8px] font-bold tracking-widest uppercase">Nền tảng đã xác minh</span>
        </div>
      </div>
      <div class="w-32 h-1 bg-accent/5 mx-auto mt-8 rounded-full"></div>
    </footer>

    <script>
      function toggleTag(element) {
        const siblings = element.parentElement.querySelectorAll(".tag-pill");
        siblings.forEach((tag) => tag.classList.remove("selected", "bg-beige-deep/40", "text-accent"));
        siblings.forEach((tag) => tag.classList.add("bg-primary/20", "text-accent/40"));
        element.classList.add("selected", "bg-beige-deep/40", "text-accent");
        element.classList.remove("bg-primary/20", "text-accent/40");
      }

      function handleRegister(e) {
        e.preventDefault();
        const name = document.getElementById("regName").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const role = document.querySelector(".tag-pill.selected")?.textContent.trim() || "Khách hàng";
        // Tạo user mới và lưu
        PicKicStore.saveUser({
          id: "u_" + Date.now(),
          name,
          email,
          role,
          joinedAt: new Date().toISOString(),
        });
        // Reset và seed lại demo data cho user mới
        localStorage.setItem("pickic_initialized", "false");
        PicKicStore.initDemoData();
        window.location.href = "index.html";
      }
    </script>
  </div>
</body>

</html>
