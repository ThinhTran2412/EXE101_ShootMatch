<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Pickic | Discovery</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&amp;family=Playfair+Display:ital,wght@0,700;1,700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFFBF0",
                        "accent-beige": "#f2f2cd",
                        "interface-dark": "#1a1a0f",
                    },
                    fontFamily: {
                        "sans": ["Plus Jakarta Sans", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        :root {
            --primary: #FFFBF0;
        }
        body {
            background-color: var(--primary);
            overflow: hidden;}
        .film-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.05;
            background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuAqoVzK0YGRAP5LeOe6bASYgBEIQM4OF5Cak1yvOq57mrUHqcFvm9SkCz0ZRIGkRVZiAG7JhjAM17f5Ma4ENgN4ngzSrjQfwK7ZQGWbZNNwpUgOa5AytKXU_dlXRVid-C8cx8JRzlbo0SyC8YHTS9hydT7-kZyVsK2-hCQYXAX8sU6ky3RSo8hvtvKoKlMzYLgB9lRhKnAvKTX7Wos8vT2OzOEBFlLlOZby4hyJMaecoAvpAl-iBnlrlGxJ-Tl_5NFLO9NrUfZHtXA);
        }
        .card-stack-container {
            perspective: 1200px;
            height: 70vh;
        }
        .photo-card {
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.6s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
        }
        .ghost-button {
            @apply flex items-center justify-center transition-all duration-300;
            background: rgba(248, 248, 217, 0.3);
            backdrop-filter: blur(8px);
            border: 0.5px solid rgba(26, 26, 15, 0.05);
        }
        .ghost-button:active {
            @apply scale-95 opacity-70;
            background: rgba(248, 248, 217, 0.6);
        }
        .clay-button {
            background: var(--primary);
            box-shadow: 4px 4px 10px rgba(0,0,0,0.02), 
                        -4px -4px 10px rgba(255,255,255,0.8);
            border: 0.5px solid rgba(26, 26, 15, 0.02);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .swipe-hint {
            animation: hint-swipe 3s infinite ease-in-out;
        }
        @keyframes hint-swipe {
            0%, 100% { transform: translateX(0); opacity: 0.2; }
            50% { transform: translateX(10px); opacity: 0.6; }
        }
    </style>
    <style>

    </style>
</head>

<body class="text-interface-dark selection:bg-black selection:text-white">
    <div id="app-shell">
        <div class="film-grain"></div>
        <header class="fixed top-0 w-full z-50 px-8 pt-10 flex items-center justify-between">
            <button class="ghost-button size-10 rounded-full">
                <span class="material-symbols-outlined text-[18px] opacity-40">tune</span>
            </button>
            <h1 class="text-sm font-bold tracking-[0.4em] uppercase">Pickic</h1>
            <button class="ghost-button size-10 rounded-full">
                <span class="material-symbols-outlined text-[18px] opacity-40">search</span>
            </button>
        </header>
        <main class="h-screen w-full flex flex-col justify-center relative px-6 overflow-hidden">

                <span class="font-display italic text-[20vw] whitespace-nowrap">Avant-Garde</span>
            </div>
            <div class="card-stack-container relative w-full max-w-sm mx-auto">
                <div
                    class="photo-card absolute inset-0 rounded-[2.5rem] overflow-hidden scale-[0.85] translate-y-12 opacity-30 blur-sm">
                    <img alt="Artistic background" class="w-full h-full object-cover"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCat6wwl1UgRCwqZZPgrbVid_qUyeUg729lIFekWfNf1U1BgCm6v8RtNmWdEauz3VnMHfQS5zBWxPYFDrnc0t0EYoN_IUfp3A5hkegwb1e7Kch0nszYc0IlKW1d2ktx7cSrYWH7Uxd8_FI6e097p8QlqwRwD5TE6OiCxGAmpeoZK6OOfE1Cf8bVbEsEdtrDGOBrUdq9i9jRqV2tdICxz7N0saDLrSFAwkqMHsg7xbWFUea8W6TTWjopD82bWvBAv3txbSRiHxlh6po" />
                </div>
                <div
                    class="photo-card absolute inset-0 rounded-[2.5rem] overflow-hidden scale-[0.92] translate-y-6 opacity-60">
                    <img alt="Artistic background" class="w-full h-full object-cover"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-mxIaMH8L5xRt2GG2cbN2nFaT3osYea-oRO45z1wzuSliH5f4igUzDvvj0SvRZjVyBl0543VGd-RguwcTSm21NXP27U0mTS0IsqVQu92FKNCnIgMmL63IlbaSn3APkjETrNyoa1L8MPE7GxlJUf6qV-q1cqon6jRsQMpft62rxDOaEdhFinvmLpM0wP_zuk2Vw8PXpzmCSy9OIxt0LAWiTgrdoQDf9gbwu_3BjR0gC0WNj_kGqN7iGc8NHLV0yVIBR88qa5hqUlA" />
                </div>
                <div class="photo-card absolute inset-0 rounded-[2.5rem] overflow-hidden rotate-[-2deg] bg-primary">
                    <div class="w-full h-full relative group">
                        <img alt="Main Discovery Photo"
                            class="w-full h-full object-cover grayscale-[0.2] contrast-[1.1]"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwioxW3jjy_6uC1TYEOXInAWiG6Lfhucd-W1WaCTQ7qyl_q0i6jj1OY14vSUiNUTGgQdWORgkYjbpRWYAGKHUI7_0uZqa2XjNXoVdZ8orm0Qo0YnWiBanA2CUCj9p6ZHlbZIVDYsmOq3ggx6zDjiinNwBbZ7FYoM5MBA3SJdzYPp6n_Nr_KvjJt1LJ9er_nWvUjOy82Spo0AAss0vPPLWr2sY2SH7NFwyfrf9_400SCeU2c2F1WEl0ARHU0ohmb3hB2D4Cvv6ABdI" />
                        <div class="absolute inset-0 bg-gradient-to-t from-primary/60 via-transparent to-transparent">
                        </div>
                        <div class="absolute bottom-10 left-8 right-8">
                            <h2 class="font-display italic text-4xl mb-2 leading-none">The Void</h2>
                            <div class="flex items-center gap-3">
                                <span class="text-[10px] font-bold tracking-widest uppercase opacity-60">Series //
                                    Noir</span>
                                <span class="h-px w-6 bg-black/10"></span>
                                <span class="text-[10px] font-medium opacity-40">85mm · f/1.8</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-16 flex flex-col items-center gap-6">
                <div class="flex items-center gap-12">
                    <div class="flex flex-col items-center opacity-20">
                        <span class="material-symbols-outlined text-sm">west</span>
                        <span class="text-[9px] uppercase tracking-tighter mt-1">Pass</span>
                    </div>
                    <div class="h-10 w-px bg-black/5"></div>
                    <div class="flex flex-col items-center opacity-60">
                        <span class="material-symbols-outlined text-sm swipe-hint">east</span>
                        <span class="text-[9px] uppercase tracking-widest font-bold mt-1">Connect</span>
                    </div>
                </div>
            </div>
        </main>
        <footer class="fixed bottom-0 w-full z-50 px-8 pb-12">
            <div class="clay-button rounded-full h-16 flex items-center justify-between px-2">
                <div class="flex-1 flex justify-center">
                    <button class="text-interface-dark opacity-100 scale-110">
                        <span class="material-symbols-outlined fill-1">layers</span>
                    </button>
                </div>
                <div class="flex-1 flex justify-center">
                    <button class="text-interface-dark opacity-30">
                        <span class="material-symbols-outlined">explore</span>
                    </button>
                </div>
                <div class="flex-1 flex justify-center">
                    <button class="size-12 rounded-full border border-black/5 flex items-center justify-center">
                        <span class="material-symbols-outlined opacity-40">add</span>
                    </button>
                </div>
                <div class="flex-1 flex justify-center">
                    <button class="text-interface-dark opacity-30">
                        <span class="material-symbols-outlined">chat_bubble</span>
                    </button>
                </div>
                <div class="flex-1 flex justify-center">
                    <div class="size-7 rounded-full overflow-hidden border border-black/5 opacity-80">
                        <img class="w-full h-full object-cover"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCat6wwl1UgRCwqZZPgrbVid_qUyeUg729lIFekWfNf1U1BgCm6v8RtNmWdEauz3VnMHfQS5zBWxPYFDrnc0t0EYoN_IUfp3A5hkegwb1e7Kch0nszYc0IlKW1d2ktx7cSrYWH7Uxd8_FI6e097p8QlqwRwD5TE6OiCxGAmpeoZK6OOfE1Cf8bVbEsEdtrDGOBrUdq9i9jRqV2tdICxz7N0saDLrSFAwkqMHsg7xbWFUea8W6TTWjopD82bWvBAv3txbSRiHxlh6po" />
                    </div>
                </div>
            </div>
            <div class="mt-6 flex justify-center">
                <div class="w-24 h-[4px] rounded-full bg-black/10"></div>
            </div>
        </footer>
        <div class="fixed left-0 top-1/2 -translate-y-1/2 z-40 hidden md:block">
            <div class="flex flex-col gap-8 px-6">
                <a class="rotate-[-90deg] origin-left text-[10px] font-bold tracking-widest uppercase opacity-100"
                    href="#">Now</a>
                <a class="rotate-[-90deg] origin-left text-[10px] font-bold tracking-widest uppercase opacity-20"
                    href="#">Trending</a>
                <a class="rotate-[-90deg] origin-left text-[10px] font-bold tracking-widest uppercase opacity-20"
                    href="#">Nearby</a>
            </div>
        </div>

    </div>
</body>

</html>
