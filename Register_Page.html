<body class="flex flex-col h-screen overflow-hidden"><div id="app-shell">
<div class="film-grain"></div>
<div class="artistic-bg"></div>
<header class="relative z-10 px-8 pt-12 pb-6">
<div class="flex justify-between items-center mb-12">
<h1 class="font-serif italic text-2xl tracking-tighter">Pickic</h1>
<span class="text-[9px] font-bold tracking-[0.3em] uppercase opacity-40">Entry_01</span>
</div>
<div class="max-w-xs">
<h2 class="font-serif text-4xl leading-[1.1] mb-4">Create Your<br/>Artistic Identity</h2>
<p class="text-[11px] leading-relaxed opacity-50 font-light tracking-wide">
                Join an elite community of avant-garde photographers and curators.
            </p>
</div>
</header>
<main class="relative z-10 px-8 flex-1 flex flex-col justify-center">
<form class="space-y-6">
<div class="flex flex-col">
<label class="text-[9px] uppercase tracking-[0.2em] font-bold opacity-30 mb-1">Full Name</label>
<input class="minimal-input" placeholder="Aurelius Vance" type="text"/>
</div>
<div class="flex flex-col">
<label class="text-[9px] uppercase tracking-[0.2em] font-bold opacity-30 mb-1">Email Address</label>
<input class="minimal-input" placeholder="vance@pickic.art" type="email"/>
</div>
<div class="flex flex-col">
<label class="text-[9px] uppercase tracking-[0.2em] font-bold opacity-30 mb-1">Curation Style</label>
<div class="flex flex-wrap gap-2 mt-3">
<button class="tag-pill bg-beige-deep/40 text-accent" type="button">Cinematic</button>
<button class="tag-pill bg-primary/20 text-accent/40" type="button">Minimalist</button>
<button class="tag-pill bg-primary/20 text-accent/40" type="button">Noir</button>
<button class="tag-pill bg-primary/20 text-accent/40" type="button">Experimental</button>
</div>
</div>
<div class="pt-10">
<button class="textured-btn w-full py-5 rounded-sm text-[11px] font-bold tracking-[0.4em] uppercase text-accent/80 active:scale-[0.99] transition-transform">
                    Create Account
                </button>
</div>
</form>
<div class="mt-8 text-center">
<button class="text-[10px] uppercase tracking-[0.2em] font-medium opacity-40 hover:opacity-80 transition-opacity">
                Already an artist? <span class="border-b border-accent/20 pb-0.5">Sign In</span>
</button>
</div>
</main>
<footer class="relative z-10 px-8 pb-12">
<div class="flex items-center justify-between border-t border-accent/5 pt-6">
<div class="flex gap-4">
<span class="text-[8px] font-bold tracking-widest opacity-20 uppercase">Terms</span>
<span class="text-[8px] font-bold tracking-widest opacity-20 uppercase">Privacy</span>
</div>
<div class="flex items-center gap-2 opacity-20">
<span class="material-symbols-outlined text-[14px]">verified</span>
<span class="text-[8px] font-bold tracking-widest uppercase">Certified Platform</span>
</div>
</div>
<div class="w-32 h-1 bg-accent/5 mx-auto mt-8 rounded-full"></div>
</footer>
